{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Alumora</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">

    <!-- Fonts already used elsewhere in the project -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0A2E22, #103B2B 55%, #145C42);
            font-family: 'DM Sans', sans-serif;
        }

        .login-box { width: 100%; max-width: 420px; }

        .card { border: none; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.25); overflow: hidden; }

        .card-header {
            background: #0A2E22;
            color: white;
            text-align: center;
            padding: 28px;
        }

        .card-header .brand {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 22px;
            margin-top: 6px;
        }

        .card-header small { color: #CFE3DA; }
        .card-header i { font-size: 36px; color: #CFE3DA; }

        .card-body { padding: 32px; }

        .form-control { border-radius: 8px; height: 45px; }

        .btn-login {
            background: #145C42;
            color: white;
            border-radius: 8px;
            height: 46px;
            font-weight: 700;
            border: none;
        }
        .btn-login:hover { background: #1c7a58; color: #fff; }

        .msg { font-size: 13px; margin-top: 10px; }

        .signup-link {
            text-align: center;
            font-size: 13px;
            margin-top: 18px;
            color: #CFE3DA;
        }
        .signup-link a { color: #ffffff; font-weight: 600; }

        .footer-text {
            text-align: center;
            font-size: 12px;
            margin-top: 15px;
            color: #A9BDB2;
        }
    </style>
</head>

<body>

<div class="login-box">

    <div class="card">

        <!-- HEADER -->
        <div class="card-header">
            <i class="fas fa-user-graduate"></i>
            <div class="brand">Alumora</div>
            <small>Mentorship Platform</small>
        </div>

        <!-- BODY -->
        <div class="card-body">

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger msg">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn btn-login btn-block">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="signup-link">
                New alumnus? <a href="{% url 'accounts:register' %}">Register your account</a>
            </div>

        </div>

    </div>

    <div class="footer-text">
        Secure Alumni Mentorship System &copy; Alumora
    </div>

</div>

</body>
</html>
