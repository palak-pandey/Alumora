{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alumora Dashboard</title>

    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'dist/css/adminlte.min.css' %}">
 

     
    <style>
    .small-box {
    min-height: 150px;
    display: flex;
    flex-direction: column;
    justify-content: center;
   }


   .profile-user-img {
    border: 3px solid #adb5bd;
    padding: 3px;
    }
    .card {
    border-radius: 10px;
    }

   
  .full-width-textarea {
  width: 100%;
  min-height: 120px;
  resize: vertical;
  }
   

  </style>

  </head>

  

<body class="hold-transition sidebar-mini layout-fixed">

<div class="wrapper">

    <!-- Navbar -->
   <nav class="main-header navbar navbar-expand navbar-white navbar-light">

    <!-- LEFT SIDE -->
    <ul class="navbar-nav">
        <li class="nav-item">
            <a class="nav-link" data-widget="pushmenu">
                <i class="fas fa-bars"></i>
            </a>
        </li>
    </ul>

    <!-- RIGHT SIDE -->
    <ul class="navbar-nav ml-auto">

        <!-- Messages -->
        <li class="nav-item">
            <a href="{% url 'accounts:inbox' %}" class="nav-link">
                <i class="far fa-comments"></i>
            </a>
        </li>
 
   



        <!-- Notifications -->
        <li class="nav-item">
            <a href="#" class="nav-link">
                <i class="far fa-bell"></i>
            </a>
        </li>

        <li class="nav-item">
    <a class="nav-link text-danger" href="{% url 'accounts:logout' %}">
        Logout
    </a>
    </li>


  </ul>

</nav>


    <!-- Sidebar -->
<aside class="main-sidebar sidebar-dark-primary elevation-4">

    <!-- Brand Logo -->
    <a href="#" class="brand-link text-center">
        <span class="brand-text font-weight-light">Alumora</span>
    </a>

    <!-- Sidebar -->
    <div class="sidebar">

        <!-- User Panel -->
        <div class="user-panel mt-3 pb-3 mb-3 d-flex">
            <div class="image">
                <img src="https://via.placeholder.com/40" class="img-circle elevation-2" alt="User">
            </div>
            <div class="info">
            <a href="#" class="d-block">{{ request.user.username }}</a>
            </div>
        </div>

        <!-- Menu -->
        <nav class="mt-2">
            <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview">

                <!-- Dashboard -->
                <li class="nav-item">
                    <a href="{% url 'accounts:student_dashboard' %}" class="nav-link active">
                        <i class="nav-icon fas fa-tachometer-alt"></i>
                        <p>Dashboard</p>
                    </a>
                </li>

                <!-- Profile -->
                <li class="nav-item">
                    <a href="{% url 'accounts:student_profile' %}" class="nav-link">
                        <i class="nav-icon fas fa-user"></i>
                        <p>Profile</p>
                    </a>
                </li>

                <!-- Messages -->
                <li class="nav-item">
                    <a href="{% url 'accounts:inbox' %}" class="nav-link">
                        <i class="nav-icon fas fa-envelope"></i>
                        <p>Messages</p>
                    </a>
                </li>

                <!-- Notifications -->
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <i class="nav-icon fas fa-bell"></i>
                        <p>Notifications</p>
                    </a>
                </li>

                <!-- Your Mentors -->
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <i class="nav-icon fas fa-users"></i>
                        <p>Your Mentors</p>
                    </a>
                </li>

            </ul>
        </nav>

    </div>
</aside>


<!-- Main Content -->
    <div class="content-wrapper">
        <section class="content pt-3">
            <div class="container-fluid">
                {% block content %}{% endblock %}
            </div>
        </section>
    </div>

</div>

<!-- JS FILES -->
<script src="{% static 'plugins/jquery/jquery.min.js' %}"></script>
<script src="{% static 'plugins/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'dist/js/adminlte.js' %}"></script>

</body>
</html>
